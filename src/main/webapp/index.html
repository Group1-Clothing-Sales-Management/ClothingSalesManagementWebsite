<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Sale - Trang chủ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="<%= request != null ? request.getContextPath() : '/' %>/">Clothing Sale</a>
            <div class="d-flex gap-2">
                <a class="btn btn-outline-primary" href="<%= request != null ? request.getContextPath() : '' %>/customer/login">Đăng nhập</a>
                <a class="btn btn-link text-secondary" href="<%= request != null ? request.getContextPath() : '' %>/admin/login">Đăng nhập Admin/Staff</a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="h3">Sản phẩm nổi bật</h1>
            <a href="<%= request != null ? request.getContextPath() : '' %>/view/cart.jsp" class="btn btn-outline-secondary">Giỏ hàng</a>
        </div>

        <div class="row gy-4">
            <!-- Placeholder product cards; replace with dynamic listing later -->
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <img src="uploads/product/placeholder.png" class="card-img-top" alt="Product">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Áo thun basic</h5>
                        <p class="card-text text-muted">Mô tả ngắn về sản phẩm.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <strong>₫150,000</strong>
                            <a href="#" class="btn btn-sm btn-primary">Mua</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <img src="uploads/product/placeholder.png" class="card-img-top" alt="Product">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Quần jeans</h5>
                        <p class="card-text text-muted">Mô tả ngắn về sản phẩm.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <strong>₫350,000</strong>
                            <a href="#" class="btn btn-sm btn-primary">Mua</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <img src="uploads/product/placeholder.png" class="card-img-top" alt="Product">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Áo khoác nhẹ</h5>
                        <p class="card-text text-muted">Mô tả ngắn về sản phẩm.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <strong>₫420,000</strong>
                            <a href="#" class="btn btn-sm btn-primary">Mua</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-3">
                <div class="card h-100">
                    <img src="uploads/product/placeholder.png" class="card-img-top" alt="Product">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Váy nữ</h5>
                        <p class="card-text text-muted">Mô tả ngắn về sản phẩm.</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <strong>₫280,000</strong>
                            <a href="#" class="btn btn-sm btn-primary">Mua</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light py-4 mt-auto">
        <div class="container text-center text-muted">&copy; 2026 Clothing Sale</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
